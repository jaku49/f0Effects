    name: "<#FBE4D6>🐲 Drachenatem"

placeholders:
  none-selected: "<#161179>---"
  boolean-true: "<#FBE4D6>Aktiviert"
  boolean-false: "<#161179>Deaktiviert"
  max-level: "<#FBE4D6>MAX"
  format: "%effect_name% <dark_gray>(<#FBE4D6>Lvl %level%</#FBE4D6>)"
  duration-format: "%seconds%s"
