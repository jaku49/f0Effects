  LIGHTNING:
    name: "<#FBE4D6>⚡ Blitz"

  FIREWORK:
    name: "<#FBE4D6>🎆 Feuerwerk"

  ELDER_GUARDIAN:
    name: "<#FBE4D6>👻 Wächterfluch"

  HEARTS:
    name: "<#FBE4D6>❤ Liebeskill"

  FLAMES:
    name: "<#FBE4D6>🔥 Höllisch"

  CLOUD:
    name: "<#FBE4D6>☁ Engelsgleich"

  MAGIC:
    name: "<#FBE4D6>✨ Magisch"

  SONIC:
    name: "<#FBE4D6>🔊 Sonic Boom"

  TOTEM:
    name: "<#FBE4D6>🌟 Unsterblichkeit"

  SOUL:
    name: "<#FBE4D6>💀 Seelenjäger"

  BLOOD:
    name: "<#FBE4D6>🩸 Blutbad"

  ENDER:
    name: "<#FBE4D6>🌌 Leerenwanderer"

  VILLAGER:
    name: "<#FBE4D6>✳ Glücklicher Kill"

