####################################################################################################
# f0Effect - Advanced Kill Effect System
# version: 1.2.0
# --------------------------------------------------------------------------------------------------
# This plugin grants temporary combat effects to players after killing another player in arena.
# Effects can be upgraded for higher power but shorter duration.
#
# Duration values are in TICKS.
# 20 ticks = 1 second
#
# Official Material List:
# https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Material.html
#
# Official Sound List:
# https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html
####################################################################################################


####################################################################################################
# UPDATE CHECKER
# If enabled, the plugin will periodically check GitHub for a newer version
# and notify administrators in-game.
####################################################################################################
update-checker:
  enabled: true

####################################################################################################
# DATABASE SETTINGS
# Choose between "SQLITE" for local file storage or "MYSQL" for external database.
####################################################################################################

storage-type: "SQLITE"

####################################################################################################
# MYSQL DATABASE CONFIGURATION
# Stores player data, selected effects and upgrade levels.
####################################################################################################
mysql:
  host: "localhost"
  port: 3306
  database: "minecraft"
  username: "minecraft"
  password: "mc123"
  table_prefix: "f0effects_"


####################################################################################################
# BOSSBAR SETTINGS
# Displayed when a player has an active effect.
#
# Available colors:
# PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
#
# Available styles:
# SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20
####################################################################################################
bossbar:
  enabled: true
  title: "&#00AAFF✦ &lACTIVE EFFECT: %effect% &8(&bLevel %level%&8)"
  color: "BLUE"
  style: "SOLID"


####################################################################################################
# SOUND CONFIGURATION
# All sounds must be valid Bukkit Sound enum names.
# Full list:
# https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html
####################################################################################################
sounds:
  effect-selected:
    sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 1.0
    pitch: 1.1

  level-up:
    sound: "ENTITY_PLAYER_LEVELUP"
    volume: 1.0
    pitch: 1.2

  not-enough-money:
    sound: "ENTITY_VILLAGER_NO"
    volume: 1.0
    pitch: 1.0

  missing-previous-level:
    sound: "ENTITY_ITEM_BREAK"
    volume: 1.0
    pitch: 0.6


####################################################################################################
# MESSAGE CONFIGURATION
# Supports HEX colors (&#RRGGBB).
# Placeholders:
# %effect%  - effect name
# %level%   - upgrade level
# %cost%    - upgrade cost
# %latest%  - latest plugin version
# %current% - installed version
# %url%     - update download link
####################################################################################################
messages:
  no-permission: "&#0066FF✖ You do not have permission to use this command."
  effect-selected: "&#00AAFF✔ Effect activated: &b%effect%"
  not-enough-money: "&#0066FF✖ Not enough money. &7You need &#00AAFF%cost%$ &7to purchase this."
  level-up: "&#00AAFF⭐ Upgrade purchased: &b%effect% &7(Level &b%level%&7)"
  update-available: "&#00AAFF⚠ New version available: &b%latest% &7(current: %current%)"
  update-link: "&#3399FF➜ Download: &b%url%"


####################################################################################################
# MAIN GUI CONFIGURATION
#
# GUI size must be multiple of 9.
# Materials must match Bukkit Material enum:
# https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Material.html
####################################################################################################
gui:
  main:
    title: "&#00AAFF✦ &lCHOOSE YOUR EFFECT"
    size: 45

    info-book:
      slot: 24
      material: "BOOK"
      name: "&#3399FF📘 &lAbout Effects"
      lore:
        - "&#AAAAAAChoose one combat bonus"
        - "&#AAAAAAthat activates after"
        - "&#AAAAAAkilling another player."
        - ""
        - "&#00AAFFDominate the arena."

    upgrade-item:
      slot: 43
      material: "ANVIL"
      name: "&#00AAFF⭐ &lEFFECT UPGRADES"
      lore:
        - "&#AAAAAAHigher level = more power"
        - "&#AAAAAABut shorter duration."
        - ""
        - "&#00AAFF▸ Click to open"

    close-item:
      slot: 44
      material: "BARRIER"
      name: "&#0066FF✖ &lClose"


####################################################################################################
# UPGRADE SHOP GUI
####################################################################################################
  upgrade:
    title: "&#00AAFF⭐ &lUPGRADE SHOP"
    size: 45

    format:
      duration: "&#AAAAAA⏳ Duration: &#00AAFF%duration%s"
      cost: "&#AAAAAA💲 Cost: &#00AAFF%cost%$"
      unlocked: "&#00AAFF✔ You already own this level."
      can-buy: "&#3399FF➤ Click to purchase."
      locked: "&#0066FF✖ Purchase level %required_level% first."

    info-book:
      slot: 24
      material: "BOOK"
      name: "&#3399FF📘 &lUpgrade System"
      lore:
        - "&#AAAAAAUpgrade effects for"
        - "&#AAAAAAhigher amplifier levels."
        - ""
        - "&#00AAFFLevel 1 = 10s"
        - "&#00AAFFLevel 2 = 7s"
        - "&#00AAFFLevel 3 = 5s"

    back-item:
      slot: 43
      material: "POTION"
      name: "&#3399FF↩ &lBack"

    close-item:
      slot: 44
      material: "BARRIER"
      name: "&#0066FF✖ &lClose"


####################################################################################################
# EFFECT DEFINITIONS
#
# amplifier:
# 0 = Level I
# 1 = Level II
# 2 = Level III
#
# duration:
# 200 ticks = 10 seconds
# 140 ticks = 7 seconds
# 100 ticks = 5 seconds
####################################################################################################
effects:

  SPEED:
    material: "SUGAR"
    name: "&#00AAFF⚡ &lSPEED"
    slot: 19
    upgrade-slots: [10, 19, 28]
    lore:
      - "&#AAAAAAGain a speed boost after a kill."
      - ""
      - "&#00AAFF▸ Current level: &b%level%"
      - ""
      - "&#3399FFClick to activate."
    levels:
      1:
        amplifier: 0
        duration: 200
        cost: 1500
      2:
        amplifier: 1
        duration: 140
        cost: 4000
      3:
        amplifier: 2
        duration: 100
        cost: 9000

