      - ""
      - "&#FF3366▸ &7Aktualny poziom: &#FF3366%level%"
      - ""
      - "&#00FF00✔ Kliknij, aby aktywowac ten efekt!"
    levels:
      1:
        amplifier: 0
        duration: 100
        cost: 2000
      2:
        amplifier: 1
        duration: 140
        cost: 4000
      3:
        amplifier: 2
        duration: 200
