####################################################################################################
# f0Effect - Advanced Kill Effect & Visuals System
# Main Configuration
# Version: 1.4.0
####################################################################################################

# Plugin language. You can select from "en", "pl" or "de".
# Requires a matching file like messages_en.yml or another language in the plugin's resources folder.
language: "en"

# Update checker settings. If enabled, the plugin will check for updates on SpigotMC and notify admins in-game and in console.
update-checker:
  enabled: true

# Available: SQLITE / MYSQL
# SQLITE is recommended for small servers or when you don't want to set up a database. 
# MYSQL is better for larger servers or when you want to share data across multiple server instances.
storage-type: "SQLITE"


# MySQL configuration (only needed if storage-type is set to MYSQL)
mysql:
  host: "localhost"
  port: 3306
  database: "minecraft"
  username: "minecraft"
  password: "mc123"
  table_prefix: "f0effects_"

# Bossbar settings
# Documentation of colors and styles: 
# https://hub.spigotmc.org/javadocs/spigot/org/bukkit/boss/BarColor.html
# https://hub.spigotmc.org/javadocs/spigot/org/bukkit/boss/BarStyle.html
bossbar:
  enabled: true
  color: "BLUE"
  style: "SOLID"

# Sound settings for various actions. Each action can have a sound, volume and pitch. 
# Documentation of available sounds: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html
sounds:
  effect-selected:
    sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 1.0
    pitch: 1.10

  level-up:
    sound: "ENTITY_PLAYER_LEVELUP"
    volume: 1.0
    pitch: 1.20

  not-enough-money:
    sound: "ENTITY_VILLAGER_NO"
    volume: 1.0
    pitch: 1.00

  missing-previous-level:
    sound: "ENTITY_ITEM_BREAK"
    volume: 1.0
    pitch: 0.60

####################################################################################################
# GUI
# Layout, materials and button slots.
# Text (names, lore) should be handled in language files.
####################################################################################################

gui:
  main:
    size: 45
    info-book:
      slot: 24
      material: "BOOK"
    clear-item:
      slot: 40
      material: "MILK_BUCKET"
    settings-item:
      slot: 41
      material: "COMPARATOR"
    upgrade-item:
      slot: 42
      material: "ANVIL"
    visuals-item:
      slot: 43
      material: "ENDER_EYE"
    close-item:
      slot: 44
      material: "BARRIER"

  upgrade:
    size: 45
    info-book:
      slot: 24
      material: "BOOK"
    back-item:
      slot: 43
      material: "ARROW"
    close-item:
      slot: 44
      material: "BARRIER"

  visuals:
    size: 45
    back-item:
      slot: 43
      material: "ARROW"
    close-item:
      slot: 44
      material: "BARRIER"

  settings:
    size: 45
    back-item:
      slot: 43
      material: "ARROW"
    close-item:
      slot: 44
      material: "BARRIER"

####################################################################################################
# UPGRADE EFFECTS
# Each effect has GUI slot, material and upgrade levels.
####################################################################################################

effects:
  SPEED:
