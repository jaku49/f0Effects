    slot: 22
    upgrade-slots: [13, 22, 31]
    lore:
      - "&#AAAAAAYadasz znacznie większe obrażenia"
      - "&#AAAAAApo zabójstwie."
      - ""
      - "&#00AAFF➤ Odblokowany poziom: &b%level%"
      - ""
      - "&#3399FF➤ Kliknij, aby wybrać"
    levels:
      1: { amplifier: 0, duration: 200, cost: 3000 }
      2: { amplifier: 1, duration: 140, cost: 7000 }
      3: { amplifier: 2, duration: 100, cost: 15000 }

