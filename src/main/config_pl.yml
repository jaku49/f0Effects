      - "&#AAAAAApo zabójstwie."
      - ""
      - "&#00AAFF➤ Odblokowany poziom: &b%level%"
      - ""
      - "&#3399FF➤ Kliknij, aby wybrać"
    levels:
      1: { amplifier: 0, duration: 200, cost: 2500 }
      2: { amplifier: 1, duration: 140, cost: 6000 }
      3: { amplifier: 2, duration: 100, cost: 13000 }

  STRENGTH:
    material: "IRON_SWORD"
