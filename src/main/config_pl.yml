# Wklej zawartość tego pliku do ./plugins/f0Effects/config.yml zastępując nią poprzednią treść pliku!
####################################################################################################
# f0Effects - Zaawansowany system efektów i wizualizacji po zabójstwie
# Wersja: 1.3.0
#
# Dokumentacja dla administracji:
# Główna dokumentacja Spigot API: https://hub.spigotmc.org/javadocs/spigot/
# Dźwięki: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html
# Materiały: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Material.html
# Cząsteczki: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Particle.html
# BossBar: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/boss/BossBar.html
#
# Format kolorów:
# Używaj kolorów hex w formacie &#RRGGBB razem ze standardowym formatowaniem Minecrafta
# takim jak &a, &b, &l, &7 itd.
####################################################################################################

########################################
# SPRAWDZANIE AKTUALIZACJI
# Włącza automatyczne sprawdzanie wersji
########################################
update-checker:
  enabled: true

########################################
# PAMIĘĆ / BAZA DANYCH
# SQLITE jest zalecane dla małych serwerów.
# MYSQL jest zalecane dla większych sieci.
########################################
storage-type: "SQLITE"

mysql:
  host: "localhost"
  port: 3306
  database: "minecraft"
  username: "minecraft"
  password: "mc123"
  table_prefix: "f0effects_"

########################################
# BOSSBAR
# Pokazuje aktywny efekt na górze ekranu gracza
########################################
bossbar:
  enabled: true
  title: "&#00AAFF✦ &lAKTYWNY EFEKT: %effect% &8(&bPoziom %level%&8)"
  color: "BLUE"
  style: "SOLID"

########################################
# DŹWIĘKI
# Używają nazw dźwięków Bukkit/Spigot
########################################
sounds:
  effect-selected:
    sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 1.0
    pitch: 1.1

  level-up:
    sound: "ENTITY_PLAYER_LEVELUP"
    volume: 1.0
    pitch: 1.2

  not-enough-money:
    sound: "ENTITY_VILLAGER_NO"
    volume: 1.0
    pitch: 1.0

  missing-previous-level:
    sound: "ENTITY_ITEM_BREAK"
    volume: 1.0
    pitch: 0.6

########################################
# WIADOMOŚCI
# Wiadomości wyświetlane graczom
########################################
messages:
  no-permission: "&#0066FF✖ Nie masz uprawnień do użycia tej komendy."
  effect-selected: "&#00AAFF✔ Aktywowano efekt: &b%effect%"
  visual-selected: "&#00AAFF✔ Zmieniono efekt wizualny na: &b%visual%"
  not-enough-money: "&#0066FF✖ Brakuje Ci pieniędzy. &7Potrzebujesz &#00AAFF%cost%$ &7, aby to kupić."
  level-up: "&#00AAFF⭐ Zakupiono ulepszenie: &b%effect% &7(Poziom &b%level%&7)"
  visual-bought: "&#00AAFF✨ Zakupiono efekt wizualny: &b%visual%"
  update-available: "&#00AAFF⚠ Dostępna jest nowa wersja: &b%latest% &7(obecna: %current%)"
  update-link: "&#3399FF➜ Pobierz: &b%url%"

########################################
# PLACEHOLDERY
# Wartości wielokrotnego użytku w menu i wiadomościach
########################################
placeholders:
  none-selected: "&7Brak"
  format: "%effect_name% &8(&bLvl %level%&8)"
  duration-format: "%seconds%s"
  max-level: "&bMAX"
  boolean-true: "&aTak"
  boolean-false: "&cNie"

########################################
# GUI
# Menu ekwipunku dla efektów, ulepszeń i efektów wizualnych
########################################
gui:
  main:
    title: "&#00AAFF✦ &lWYBIERZ SWÓJ EFEKT"
    size: 45

    info-book:
      slot: 24
      material: "BOOK"
      name: "&#3399FF📘 &lO efektach"
      lore:
        - "&#AAAAAAWybierz bonus bojowy"
        - "&#AAAAAAktóry aktywuje się po zabójstwie."

    visuals-item:
      slot: 42
      material: "ENDER_EYE"
      name: "&#00AAFF👁 &lEFEKTY WIZUALNE"
      lore:
        - "&#AAAAAADostosuj animację po zabójstwie."
        - ""
        - "&#00AAFF➤ Kliknij, aby otworzyć"

    upgrade-item:
      slot: 43
      material: "ANVIL"
      name: "&#00AAFF⭐ &lULEPSZENIA EFEKTÓW"
      lore:
        - "&#AAAAAAWiększa siła, krótszy czas trwania."
        - ""
        - "&#00AAFF➤ Kliknij, aby otworzyć"

    close-item:
      slot: 44
      material: "BARRIER"
      name: "&#0066FF✖ &lZamknij"

  upgrade:
    title: "&#00AAFF⭐ &lSKLEP ULEPSZEŃ"
    size: 45

    format:
      duration: "&#AAAAAA⏳ Czas trwania: &#00AAFF%duration%s"
      cost: "&#AAAAAA💲 Koszt: &#00AAFF%cost%$"
      unlocked: "&#00AAFF✔ Ten poziom jest już odblokowany."
      can-buy: "&#3399FF➤ Kliknij, aby kupić."
      locked: "&#0066FF✖ Najpierw kup poprzedni poziom."

    info-book:
      slot: 24
      material: "BOOK"
      name: "&#3399FF📘 &lSystem ulepszeń"
      lore:
        - "&#AAAAAAUlepszaj efekty,"
        - "&#AAAAAAaby uzyskać wyższy poziom mocy."

    back-item:
      slot: 43
      material: "ARROW"
      name: "&#3399FF↩ &lPowrót"

    close-item:
      slot: 44
      material: "BARRIER"
      name: "&#0066FF✖ &lZamknij"

  visuals:
    title: "&#00AAFF👁 &lKOSMETYKA EFEKTÓW"
    size: 45

    format:
      unlocked: "&#00AAFF✔ Odblokowany"
      selected: "&#3399FF⭐ Aktualnie wybrany"
      click-to-select: "&#00AAFF➤ Kliknij, aby wybrać"
      cost: "&#AAAAAA💲 Koszt: &#00AAFF%cost%$"
      click-to-buy: "&#00AAFF➤ Kliknij, aby kupić"

    back-item:
      slot: 43
      material: "ARROW"
      name: "&#3399FF↩ &lPowrót do menu"

    close-item:
      slot: 44
      material: "BARRIER"
      name: "&#0066FF✖ &lZamknij"

########################################
# EFEKTY
# Główne bonusy aktywowane po zabójstwie
# amplifier: poziom siły efektu (0 = poziom 1)
# duration: w tickach (20 ticków = 1 sekunda)
########################################
effects:
  SPEED:
    material: "SUGAR"
    name: "&#00AAFF⚡ &lSZYBKOŚĆ"
    slot: 19
    upgrade-slots: [10, 19, 28]
    lore:
      - "&#AAAAAAZyskujesz duży zastrzyk szybkości"
      - "&#AAAAAApo każdym zabójstwie."
      - ""
      - "&#00AAFF➤ Odblokowany poziom: &b%level%"
      - ""
      - "&#3399FF➤ Kliknij, aby wybrać"
    levels:
      1: { amplifier: 0, duration: 200, cost: 1500 }
      2: { amplifier: 1, duration: 140, cost: 4000 }
      3: { amplifier: 2, duration: 100, cost: 9000 }

  RESISTANCE:
    material: "CHAINMAIL_CHESTPLATE"
    name: "&#3399FF🛡 &lODPORNOŚĆ"
    slot: 20
    upgrade-slots: [11, 20, 29]
    lore:
      - "&#AAAAAAOtrzymujesz znacznie mniejsze obrażenia"
      - "&#AAAAAApo zabójstwie."
      - ""
      - "&#00AAFF➤ Odblokowany poziom: &b%level%"
      - ""
      - "&#3399FF➤ Kliknij, aby wybrać"
    levels:
      1: { amplifier: 0, duration: 200, cost: 2000 }
      2: { amplifier: 1, duration: 140, cost: 5000 }
      3: { amplifier: 2, duration: 100, cost: 11000 }

  REGENERATION:
    material: "GOLDEN_APPLE"
    name: "&#00CCFF❤ &lREGENERACJA"
